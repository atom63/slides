name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - run: pnpm -r test

      - run: pnpm -r lint
